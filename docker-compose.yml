version: "3.9"

services:
  app:
    build: .
    container_name: short_url_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/short_url_db?sslmode=disable
      GEOIP_LOC: internal/geoip/GeoLite2-Country.mmdb
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: short_url_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: short_url_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
