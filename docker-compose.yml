version: "3.9"

services:
  app:
    build: .
    container_name: short_url_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: ${ DATABASE_URL }
      GEOIP_LOC: ${ GEOIP_LOC }
      HASH_SALT: ${ HASH_SALT }
      JWT_SECRET_KEY: ${ JWT_SECRET_KEY }
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: short_url_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: short_url_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./internal/geodb/GeoLite2-Country.mmdb:/app/internal/geodb/GeoLite2-Country.mmdb:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
